#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "readeck"
name = "Readeck"
description.en = "Bookmark manager and a read later tool"
description.fr = "Gestionnaire de favoris et outil de lecture ultérieure"

version = "0.22.2~ynh1"

maintainers = [ "OniriCorpe" ]

[upstream]
license = "AGPL-3.0"
website = "https://readeck.org/"
admindoc = "https://readeck.org/en/docs/"
code = "https://codeberg.org/readeck/readeck"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    i386.url = "https://codeberg.org/readeck/readeck/releases/download/0.22.2/readeck-0.22.2-linux-386"
    i386.sha256 = "fb81b74f7f1128234a4e6318502ab6ffcfdcfe7f83cda71379ee897887903384"
    amd64.url = "https://codeberg.org/readeck/readeck/releases/download/0.22.2/readeck-0.22.2-linux-amd64"
    amd64.sha256 = "aaefe3d463b46701cc57af1957dc1bf85e8380ce9bfb1daf933753258d76e09b"
    arm64.url = "https://codeberg.org/readeck/readeck/releases/download/0.22.2/readeck-0.22.2-linux-arm64"
    arm64.sha256 = "4e64cba672ec3eb79ba683cc00b39b4483e7ddb5bbe628ba83a3ce3702d17dc1"
    armhf.url = "https://codeberg.org/readeck/readeck/releases/download/0.22.2/readeck-0.22.2-linux-arm-5"
    armhf.sha256 = "62b73da55231f0b4218347b3b51a88587cc72b61ab764bac71d37686b9948f37"
    rename = "readeck"

    autoupdate.strategy = "latest_forgejo_release"
    autoupdate.asset.i386 = "^readeck-.*-linux-386$"
    autoupdate.asset.amd64 = "^readeck-.*-linux-amd64$"
    autoupdate.asset.arm64 = "^readeck-.*-linux-arm64$"
    autoupdate.asset.armhf = "^readeck-.*-linux-arm-5$"
    
    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    api.url = "/api"
    api.allowed = "visitors"
    api.show_tile = false
    api.auth_header = false

    opds.url = "/opds"
    opds.allowed = "visitors"
    opds.show_tile = false
    opds.auth_header = false

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
